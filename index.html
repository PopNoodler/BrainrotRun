<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<title>Brainrot Rush 3D — Tung Tung Tung Sahur</title>
<link rel="manifest" href="manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0e1a;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;user-select:none;touch-action:none}
  canvas{display:block;position:fixed;inset:0}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:10}
  .hidden{display:none!important}
  #menu{background:radial-gradient(120% 90% at 50% 22%,rgba(90,40,140,.45),rgba(8,10,26,.9))}
  .title{font-size:clamp(34px,10vw,66px);font-weight:900;line-height:.95;letter-spacing:-1px;
    background:linear-gradient(180deg,#ffe14d,#ff7a3d 55%,#e0326e);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 4px 0 rgba(0,0,0,.25);filter:drop-shadow(0 6px 18px rgba(255,120,60,.4))}
  .subtitle{font-size:clamp(13px,3.6vw,18px);font-weight:800;color:#9fe6ff;margin-top:6px;letter-spacing:2px;text-transform:uppercase;opacity:.9}
  .flag{font-size:clamp(15px,4vw,22px);margin:8px 0 4px;letter-spacing:3px}
  .btn{font-size:clamp(20px,5.5vw,26px);font-weight:900;color:#0a0e1a;background:linear-gradient(180deg,#ffe14d,#ffb020);
    border:none;border-radius:999px;padding:16px 46px;cursor:pointer;margin-top:20px;box-shadow:0 8px 0 #b9791a,0 14px 26px rgba(255,180,40,.4);transition:transform .06s}
  .btn:active{transform:translateY(4px);box-shadow:0 4px 0 #b9791a,0 8px 16px rgba(255,180,40,.4)}
  .stats{display:flex;gap:26px;margin-top:16px;font-weight:800}
  .stat{text-align:center}.stat b{display:block;font-size:clamp(22px,6vw,32px);color:#ffe14d}
  .stat span{font-size:11px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
  .hint{font-size:12px;opacity:.6;margin-top:18px;line-height:1.7}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
    padding:max(12px,env(safe-area-inset-top)) 16px 0;z-index:5;pointer-events:none;font-weight:900}
  #scoreBox{font-size:clamp(22px,6vw,34px);text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #scoreBox small{font-size:12px;opacity:.6;font-weight:700}
  #coinBox{font-size:clamp(18px,5vw,26px);color:#ffe14d;text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #goTitle{font-size:clamp(30px,9vw,54px);font-weight:900;color:#ff5b6b;text-shadow:0 3px 0 rgba(0,0,0,.3)}
  .goRow{display:flex;justify-content:space-between;width:min(88vw,340px);padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.12);font-weight:800}
  .goRow b{color:#ffe14d}
  #pauseBtn{position:fixed;top:max(12px,env(safe-area-inset-top));right:12px;z-index:6;width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(255,255,255,.25);background:rgba(20,24,44,.7);color:#fff;font-size:16px;cursor:pointer;pointer-events:auto;display:none}
  #verTag{position:fixed;bottom:6px;left:0;right:0;text-align:center;font-size:10px;opacity:.3;letter-spacing:2px;z-index:11}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#9fe6ff;z-index:20;background:#0a0e1a}
  .brl{color:#e0326e}.brm{color:#4fd0ff}
</style>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<body>
<div id="loading">loading brainrot… 🧠</div>
<button id="pauseBtn">⏸</button>

<div id="hud" class="hidden">
  <div id="scoreBox">0 <small>M</small></div>
  <div id="coinBox">🪙 0</div>
</div>

<div class="overlay hidden" id="menu">
  <div class="flag">🇮🇹 🧠 🇮🇹</div>
  <div class="title">BRAINROT<br>RUSH</div>
  <div class="subtitle">Tung Tung Tung Sahur</div>
  <div class="stats">
    <div class="stat"><b id="mBest">0</b><span>best (m)</span></div>
    <div class="stat"><b id="mCoins">0</b><span>coins</span></div>
  </div>
  <button class="btn" id="playBtn">RUN ▶</button>
  <div class="hint">⬅️ ➡️ / swipe lanes · ⬆️ jump (land on trains!) · ⬇️ roll<br><span class="brl">tralalero</span> <span class="brm">tralala</span> 🦈</div>
</div>

<div class="overlay hidden" id="gameover">
  <div id="goTitle">TUNG DOWN!</div>
  <div style="margin:16px 0">
    <div class="goRow"><span>Distance</span><b id="goDist">0 m</b></div>
    <div class="goRow"><span>Coins</span><b id="goCoins">0</b></div>
    <div class="goRow"><span>Best</span><b id="goBest">0 m</b></div>
  </div>
  <div id="goQuip" style="font-size:14px;color:#9fe6ff;font-weight:800;min-height:20px;margin-bottom:4px"></div>
  <button class="btn" id="againBtn">RUN AGAIN ▶</button>
</div>

<div id="verTag">BRAINROT RUSH 3D v3</div>

<script type="module">
import * as THREE from 'three';
const GAME_VERSION='v3';
const el=id=>document.getElementById(id);

// ============ renderer / scene / camera ============
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x2a1c4a);
scene.fog=new THREE.Fog(0x2a1c4a, 45, 115);
const camera=new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 300);
const camBase=new THREE.Vector3(0,6.2,-9.5);
camera.position.copy(camBase); camera.lookAt(0,2.6,10);
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// lights
scene.add(new THREE.HemisphereLight(0xbfd4ff,0x33244a,1.05));
const sun=new THREE.DirectionalLight(0xfff3d0,1.25); sun.position.set(-8,20,6); scene.add(sun);

// ============ constants ============
const LANEX=2.4, SPEED0=22, SPEEDMAX=64, GRAV=85, JUMPV=27;
const P_H=2.4, P_HALF=0.55;               // player collision height & half-width/depth
const Z_SPAWN=115;
const laneOf=i=>(i-1)*LANEX;

// ============ ground + scrolling world ============
const groundMat=new THREE.MeshLambertMaterial({color:0x3a3352});
const ground=new THREE.Mesh(new THREE.BoxGeometry(LANEX*3+3, 1, 400), groundMat);
ground.position.set(0,-0.5,120); scene.add(ground);
// gravel sides
const sideMat=new THREE.MeshLambertMaterial({color:0x241d38});
for(const sx of [-1,1]){ const s=new THREE.Mesh(new THREE.BoxGeometry(10,1.2,400),sideMat); s.position.set(sx*(LANEX*1.5+6.5),-0.6,120); scene.add(s); }
// rails (visual)
const railMat=new THREE.MeshLambertMaterial({color:0x8a8496});
for(let l=0;l<3;l++){ for(const off of [-0.7,0.7]){ const r=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,400),railMat); r.position.set(laneOf(l)+off,0.07,120); scene.add(r); } }
// moving dashes (speed sense) — recycled
const dashMat=new THREE.MeshBasicMaterial({color:0xffe14d});
const dashes=[];
for(let i=0;i<26;i++){ const d=new THREE.Mesh(new THREE.PlaneGeometry(0.35,3),dashMat); d.rotation.x=-Math.PI/2; d.position.set(0,0.06,i*9); scene.add(d); dashes.push(d); }
// buildings scenery (recycled)
const bMats=[0x5a3fb0,0x8a5cff,0xe0326e,0x4fd0ff,0xff7a3d].map(c=>new THREE.MeshLambertMaterial({color:c}));
const buildings=[];
for(let i=0;i<24;i++){ const bh=8+Math.random()*22, side=i%2?1:-1;
  const b=new THREE.Mesh(new THREE.BoxGeometry(4+Math.random()*3,bh,4+Math.random()*4), bMats[i%bMats.length]);
  b.position.set(side*(11+Math.random()*8), bh/2-1, i*11); scene.add(b); buildings.push(b); }

// ============ player: Tung Tung Tung Sahur (wooden bat guy) ============
function buildSahur(){
  const g=new THREE.Group();
  const wood=new THREE.MeshLambertMaterial({color:0xc98a4e});
  const woodD=new THREE.MeshLambertMaterial({color:0x8f5c2e});
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.72,2.4,12), wood); body.position.y=1.5; g.add(body);
  const top=new THREE.Mesh(new THREE.SphereGeometry(0.6,12,10,0,Math.PI*2,0,Math.PI/2), wood); top.position.y=2.7; g.add(top);
  // eyes
  const white=new THREE.MeshLambertMaterial({color:0xffffff}), black=new THREE.MeshLambertMaterial({color:0x111111});
  for(const ex of [-0.22,0.22]){ const e=new THREE.Mesh(new THREE.SphereGeometry(0.17,10,8),white); e.position.set(ex,2.35,0.5); g.add(e);
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,6),black); p.position.set(ex,2.35,0.63); g.add(p); }
  // mouth
  const mouth=new THREE.Mesh(new THREE.CircleGeometry(0.2,12), new THREE.MeshLambertMaterial({color:0x5a1414})); mouth.position.set(0,1.95,0.58); g.add(mouth);
  // arms
  const arms=[];
  for(const ax of [-1,1]){ const a=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,1.1,8),woodD); a.position.set(ax*0.72,1.7,0); a.rotation.z=ax*0.5; g.add(a); arms.push(a); }
  // bat in right hand
  const bat=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.16,1.3,8), new THREE.MeshLambertMaterial({color:0x7a4a22})); bat.position.set(1.15,1.2,0.1); bat.rotation.z=0.7; g.add(bat);
  // legs
  const legMat=woodD, legs=[];
  for(const lx of [-0.28,0.28]){ const l=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,0.9,8),legMat); l.position.set(lx,0.3,0); g.add(l); legs.push(l); }
  g.userData={legs,arms,body};
  return g;
}
const player=buildSahur(); scene.add(player);
// fake soft shadow
const shadow=new THREE.Mesh(new THREE.CircleGeometry(0.9,20), new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.32}));
shadow.rotation.x=-Math.PI/2; shadow.position.y=0.02; scene.add(shadow);

// ============ obstacle + coin materials/pools ============
const trainMats=[0xd63b57,0x3b7bd6,0xf0a83b,0x46c24d,0x8a5cff].map(c=>new THREE.MeshLambertMaterial({color:c}));
const barrierMat=new THREE.MeshLambertMaterial({color:0xff5b6b});
const overMat=new THREE.MeshLambertMaterial({color:0x4fd0ff});
const coinGeo=new THREE.CylinderGeometry(0.42,0.42,0.12,16);
const coinMat=new THREE.MeshLambertMaterial({color:0xffe14d,emissive:0x6b5410});
let obstacles=[], coins=[];
function clearWorld(){ for(const o of obstacles) scene.remove(o.mesh); for(const c of coins) scene.remove(c.mesh); obstacles=[]; coins=[]; }

// ---- obstacle spawning (fairness-guaranteed) ----
let lastOpen=1, nextZ=0;
function addObstacle(type,lane,z){
  let mesh, top, len;
  if(type==='train'){ len=14; top=2.7; mesh=new THREE.Mesh(new THREE.BoxGeometry(1.9,top,len), trainMats[(Math.random()*trainMats.length)|0]);
    mesh.position.set(laneOf(lane), top/2, z+len/2); }
  else if(type==='truck'){ len=5.5; top=2.1; mesh=new THREE.Mesh(new THREE.BoxGeometry(1.9,top,len), trainMats[(Math.random()*trainMats.length)|0]);
    mesh.position.set(laneOf(lane), top/2, z+len/2); }
  else if(type==='low'){ len=1.2; top=1.05; mesh=new THREE.Mesh(new THREE.BoxGeometry(2.0,top,len), barrierMat);
    mesh.position.set(laneOf(lane), top/2, z); }
  else { /* overhead */ len=1.2; top=3.6; const bot=1.6; mesh=new THREE.Mesh(new THREE.BoxGeometry(2.0,top-bot,len), overMat);
    mesh.position.set(laneOf(lane), (top+bot)/2, z); obstacles.push({mesh,type,lane,z,z2:z+len,top,bot,len}); scene.add(mesh); return; }
  scene.add(mesh); obstacles.push({mesh,type,lane,z,z2:z+len,top,bot:0,len});
}
function addCoin(lane,z,y){ const m=new THREE.Mesh(coinGeo,coinMat); m.rotation.x=Math.PI/2; m.position.set(laneOf(lane),y||1.1,z); scene.add(m); coins.push({mesh,lane,z,y:y||1.1,got:false}); }
function spawnRow(z){
  const r=Math.random();
  if(r<0.66){
    if(Math.random()<0.42){ // two lanes blocked → open lane reachable from lastOpen
      const ch=[lastOpen-1,lastOpen,lastOpen+1].filter(l=>l>=0&&l<3); const open=ch[(Math.random()*ch.length)|0];
      for(let L=0;L<3;L++) if(L!==open) addObstacle(pickType(),L,z);
      lastOpen=open;
      // reward: coins on top of a train sometimes (jump-on payoff)
    } else {
      const blk=(Math.random()*3)|0; addObstacle(pickType(),blk,z);
      lastOpen=(blk!==lastOpen)?lastOpen:[lastOpen-1,lastOpen+1].filter(l=>l>=0&&l<3)[0];
    }
  } else { // coin run along the safe lane
    const L=Math.random()<0.6?lastOpen:(Math.random()*3)|0, n=5+((Math.random()*4)|0), hi=Math.random()<0.3;
    for(let i=0;i<n;i++) addCoin(L, z+i*2.4, hi?3.1:1.1);
  }
}
function pickType(){ const r=Math.random(); return r<0.42?'train':r<0.64?'truck':r<0.82?'low':'over'; }

// ============ game state ============
const MENU=0,PLAY=1,OVER=2; let state=MENU, paused=false;
let speed=SPEED0, dist=0, coins$=0, tRun=0, shake=0;
const P={ lane:1, x:0, y:0, vy:0, roll:0, grounded:true };
let best=+localStorage.getItem('br_best')||0, totalCoins=+localStorage.getItem('br_coins')||0;

// ============ audio ============
let AC=null,muted=false; const ac=()=>{ if(!AC){try{AC=new (AudioContext||webkitAudioContext)()}catch(e){}} return AC; };
function tone(f,d,t,v,s){ if(muted)return; const a=ac(); if(!a)return; const o=a.createOscillator(),g=a.createGain();
  o.type=t||'square'; o.frequency.value=f; if(s)o.frequency.exponentialRampToValueAtTime(s,a.currentTime+d);
  g.gain.value=v||0.12; g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d); o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d); }
const sCoin=()=>tone(880,0.07,'square',0.09,1320), sJump=()=>tone(420,0.13,'sine',0.13,760), sRoll=()=>tone(260,0.13,'sawtooth',0.09,120),
  sLane=()=>tone(600,0.05,'triangle',0.06,720), sLand=()=>tone(200,0.08,'sine',0.1,120),
  sHit=()=>{tone(180,0.3,'sawtooth',0.2,60);setTimeout(()=>tone(90,0.4,'sawtooth',0.16,50),80);};

// ============ input ============
function move(d){ if(state!==PLAY||paused)return; const t=Math.max(0,Math.min(2,P.lane+d)); if(t!==P.lane){P.lane=t;sLane();} }
function jump(){ if(state!==PLAY||paused)return; if(P.grounded&&P.roll<=0){ P.vy=JUMPV; P.grounded=false; sJump(); } }
function roll(){ if(state!==PLAY||paused)return; if(!P.grounded){ P.vy=-JUMPV*0.9; } P.roll=0.55; sRoll(); }
addEventListener('keydown',e=>{ const k=e.key.toLowerCase();
  if((state===MENU||state===OVER)&&(k===' '||k==='enter')){startGame();return;}
  if(k==='arrowleft'||k==='a')move(-1); else if(k==='arrowright'||k==='d')move(1);
  else if(k==='arrowup'||k==='w'||k===' ')jump(); else if(k==='arrowdown'||k==='s')roll();
  else if(k==='p'||k==='escape')togglePause(); });
let tx=0,ty=0;
renderer.domElement.addEventListener('touchstart',e=>{const t=e.changedTouches[0];tx=t.clientX;ty=t.clientY;},{passive:true});
renderer.domElement.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;
  if(state===MENU){startGame();return;} if(state===OVER)return;
  if(Math.abs(dx)<24&&Math.abs(dy)<24){jump();return;}
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1); else dy<0?jump():roll(); },{passive:true});
el('playBtn').onclick=startGame; el('againBtn').onclick=startGame; el('pauseBtn').onclick=togglePause;
function togglePause(){ if(state!==PLAY)return; paused=!paused; el('pauseBtn').textContent=paused?'▶':'⏸'; }

// ============ start / over ============
function reset(){ clearWorld(); speed=SPEED0; dist=0; coins$=0; tRun=0; shake=0; lastOpen=1; nextZ=40;
  P.lane=1; P.x=0; P.y=0; P.vy=0; P.roll=0; P.grounded=true;
  // buildings/dashes reset positions handled continuously
}
function startGame(){ ac(); reset(); state=PLAY; paused=false;
  el('menu').classList.add('hidden'); el('gameover').classList.add('hidden'); el('hud').classList.remove('hidden'); el('pauseBtn').style.display='block'; }
const QUIPS=['Tralalero Tralala 🦈','Bombardiro Crocodilo 🐊✈️','Sahur got tung\'d','Lirilì Larilà 🌵','skibidi sahur','Boneca Ambalabu 🐸','Cappuccino Assassino ☕','brainrot certified 🧠'];
function gameOver(){ state=OVER; shake=1.2; sHit(); totalCoins+=coins$; localStorage.setItem('br_coins',totalCoins);
  if(dist>best){best=Math.floor(dist);localStorage.setItem('br_best',best);}
  el('goDist').textContent=Math.floor(dist)+' m'; el('goCoins').textContent=coins$; el('goBest').textContent=best+' m';
  el('goQuip').textContent=QUIPS[(Math.random()*QUIPS.length)|0];
  setTimeout(()=>{ el('hud').classList.add('hidden'); el('pauseBtn').style.display='none'; el('gameover').classList.remove('hidden'); el('mBest').textContent=best; el('mCoins').textContent=totalCoins; },700); }

// ============ update ============
function update(dt){
  tRun+=dt; speed=Math.min(SPEEDMAX, SPEED0+dist*0.02); dist+=speed*dt;
  // lane lerp
  const tx2=laneOf(P.lane); P.x+=(tx2-P.x)*Math.min(1,dt*13);
  // roll timer
  if(P.roll>0)P.roll-=dt;
  // vertical physics
  P.vy-=GRAV*dt; P.y+=P.vy*dt;
  // support height: ground or top of an obstacle we're standing over (same lane region, within z span)
  let support=0;
  for(const o of obstacles){ if(o.type==='over')continue;
    const dxl=Math.abs(P.x-laneOf(o.lane)); if(dxl>1.2)continue;
    if(o.z<=0.5 && o.z2>=-0.5){ if(P.y >= o.top-0.5) support=Math.max(support,o.top); }
  }
  if(P.y<=support){ if(P.vy<-0.1&&!P.grounded)sLand(); P.y=support; P.vy=0; P.grounded=true; } else P.grounded=false;
  // move obstacles/coins toward player
  const dz=speed*dt;
  for(const o of obstacles){ o.z-=dz; o.z2-=dz; o.mesh.position.z-=dz; }
  for(const c of coins){ c.z-=dz; c.mesh.position.z-=dz; c.mesh.rotation.z+=dt*6; }
  // collisions (player plane at z≈0)
  for(const o of obstacles){
    if(o.z>P_HALF || o.z2< -P_HALF) continue;               // not at player plane
    const dxl=Math.abs(P.x-laneOf(o.lane)); if(dxl>0.95+ (o.type==='low'?0:0)) continue;  // different lane
    if(o.type==='over'){ const headTop=P.y + (P.roll>0?1.1:P_H); if(P.y<o.top && headTop>o.bot){ return gameOver(); } }
    else { // solid: crash if our feet are below its top (we ran into the side/front)
      if(P.y < o.top-0.5){ return gameOver(); }
    }
  }
  // coin collect
  for(const c of coins){ if(c.got)continue;
    if(Math.abs(c.z)<1.1 && Math.abs(P.x-laneOf(c.lane))<1.1 && Math.abs((P.y+1.1)-c.y)<1.6){
      c.got=true; coins$++; sCoin(); scene.remove(c.mesh);
    }
  }
  // cull passed
  obstacles=obstacles.filter(o=>{ if(o.z2< -14){scene.remove(o.mesh);return false;} return true; });
  coins=coins.filter(c=>{ if(c.got)return false; if(c.z< -8){scene.remove(c.mesh);return false;} return true; });
  // spawn ahead
  nextZ-=dz; if(nextZ<=0){ spawnRow(Z_SPAWN); nextZ=Math.max(11, 22-dist*0.004); }
  // recycle scenery
  for(const d of dashes){ d.position.z-=dz; if(d.position.z< -12) d.position.z+=234; }
  for(const b of buildings){ b.position.z-=dz; if(b.position.z< -14) b.position.z+=264; }
  // player transform
  player.position.set(P.x, P.y, 0);
  const runcyc=Math.sin(tRun*speed*0.55);
  const L=player.userData.legs; if(P.grounded&&P.roll<=0){ L[0].rotation.x=runcyc*0.9; L[1].rotation.x=-runcyc*0.9; } else { L[0].rotation.x=L[1].rotation.x=(P.roll>0?1.2:-0.5); }
  player.scale.y = P.roll>0?0.55:1; player.position.y = P.y + (P.roll>0?0:0);
  player.rotation.z=(tx2-P.x)*0.12;
  shadow.position.set(P.x, support+0.02, 0); shadow.scale.setScalar(Math.max(0.4,1-(P.y-support)*0.05));
  // camera
  camera.position.x += (P.x*0.5 - camera.position.x)*Math.min(1,dt*6);
  camera.position.y = camBase.y + (shake>0? (Math.random()-0.5)*shake:0);
  camera.lookAt(P.x*0.4, 2.6, 12);
  if(shake>0)shake=Math.max(0,shake-dt*3);
  // hud
  el('scoreBox').innerHTML=Math.floor(dist)+' <small>M</small>'; el('coinBox').textContent='🪙 '+coins$;
}

// ============ loop ============
let last=performance.now();
function animate(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(state===PLAY&&!paused) update(dt);
  // idle spin coins on menu
  renderer.render(scene,camera); requestAnimationFrame(animate); }

el('mBest').textContent=best; el('mCoins').textContent=totalCoins; el('verTag').textContent='BRAINROT RUSH 3D '+GAME_VERSION;
el('loading').style.display='none'; el('menu').classList.remove('hidden');
requestAnimationFrame(animate);

if('serviceWorker' in navigator && (location.hostname.endsWith('github.io')||location.hostname==='localhost')){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
