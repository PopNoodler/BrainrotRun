<html lang="en">

<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0e1a;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;user-select:none;touch-action:none}
  canvas{display:block;position:fixed;inset:0}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:10}
  .hidden{display:none!important}
  #menu{background:radial-gradient(120% 90% at 50% 22%,rgba(90,40,140,.45),rgba(8,10,26,.9))}
  .title{font-size:clamp(34px,10vw,66px);font-weight:900;line-height:.95;letter-spacing:-1px;
    background:linear-gradient(180deg,#ffe14d,#ff7a3d 55%,#e0326e);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 4px 0 rgba(0,0,0,.25);filter:drop-shadow(0 6px 18px rgba(255,120,60,.4))}
  .subtitle{font-size:clamp(13px,3.6vw,18px);font-weight:800;color:#9fe6ff;margin-top:6px;letter-spacing:2px;text-transform:uppercase;opacity:.9}
  .flag{font-size:clamp(15px,4vw,22px);margin:8px 0 4px;letter-spacing:3px}
  .btn{font-size:clamp(20px,5.5vw,26px);font-weight:900;color:#0a0e1a;background:linear-gradient(180deg,#ffe14d,#ffb020);
    border:none;border-radius:999px;padding:16px 46px;cursor:pointer;margin-top:20px;box-shadow:0 8px 0 #b9791a,0 14px 26px rgba(255,180,40,.4);transition:transform .06s}
  .btn:active{transform:translateY(4px);box-shadow:0 4px 0 #b9791a,0 8px 16px rgba(255,180,40,.4)}
  .stats{display:flex;gap:26px;margin-top:16px;font-weight:800}
  .stat{text-align:center}.stat b{display:block;font-size:clamp(22px,6vw,32px);color:#ffe14d}
  .stat span{font-size:11px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
  .hint{font-size:12px;opacity:.6;margin-top:18px;line-height:1.7}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
    padding:max(12px,env(safe-area-inset-top)) 16px 0;z-index:5;pointer-events:none;font-weight:900}
  #scoreBox{font-size:clamp(22px,6vw,34px);text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #scoreBox small{font-size:12px;opacity:.6;font-weight:700}
  #coinBox{font-size:clamp(18px,5vw,26px);color:#ffe14d;text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #goTitle{font-size:clamp(30px,9vw,54px);font-weight:900;color:#ff5b6b;text-shadow:0 3px 0 rgba(0,0,0,.3)}
  .goRow{display:flex;justify-content:space-between;width:min(88vw,340px);padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.12);font-weight:800}
  .goRow b{color:#ffe14d}
  #pauseBtn{position:fixed;top:max(12px,env(safe-area-inset-top));right:12px;z-index:6;width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(255,255,255,.25);background:rgba(20,24,44,.7);color:#fff;font-size:16px;cursor:pointer;pointer-events:auto;display:none}
  #verTag{position:fixed;bottom:6px;left:0;right:0;text-align:center;font-size:10px;opacity:.3;letter-spacing:2px;z-index:11}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:#9fe6ff;z-index:20;background:#0a0e1a}
  .charsel{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px}
  .arrow{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:rgba(30,20,60,.6);color:#fff;font-size:20px;cursor:pointer;flex:0 0 auto}
  .arrow:active{transform:scale(.9)}
  .charbox{min-width:210px}
  .charstat{font-size:12px;font-weight:800;color:#ffe14d;margin-top:3px;letter-spacing:.5px}
  .brl{color:#e0326e}.brm{color:#4fd0ff}
  #missions{width:min(90vw,360px);margin-top:14px;display:flex;flex-direction:column;gap:7px}
  .msn{background:rgba(20,16,40,.6);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 11px;text-align:left}
  .msnTop{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:800}
  .msnTop b{color:#ffe14d;font-size:11px}
  .msnBar{height:6px;border-radius:99px;background:rgba(255,255,255,.14);margin-top:6px;overflow:hidden}
  .msnFill{height:100%;background:linear-gradient(90deg,#ffe14d,#ff7a3d);border-radius:99px;transition:width .3s}
  .msnDone .msnFill{background:linear-gradient(90deg,#46c24d,#7ef07e)}
  .msnHdr{font-size:11px;font-weight:900;letter-spacing:2px;color:#9fe6ff;opacity:.75;text-align:left;text-transform:uppercase;margin-bottom:1px}
</style>

{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }

<body>
<div id="loading">loading brainrot… 🧠</div>
<button id="pauseBtn">⏸</button>

<div id="hud" class="hidden">
  <div id="scoreBox">0 <small>M</small></div>
  <div id="coinBox">🪙 0</div>
  <div id="pups" style="position:fixed;top:max(52px,calc(env(safe-area-inset-top) + 40px));left:0;right:0;text-align:center;font-weight:900;font-size:16px;color:#9fe6ff;text-shadow:0 2px 6px rgba(0,0,0,.7)"></div>
</div>

<div class="overlay hidden" id="menu">
  <div class="flag">🇮🇹 🧠 🇮🇹</div>
  <div class="title">BRAINROT<br>RUSH</div>
  <div class="charsel">
    <button id="prevChar" class="arrow">◀</button>
    <div class="charbox"><div id="charName" class="subtitle">Tung Tung Tung Sahur</div><div id="charStatus" class="charstat">✓ owned</div></div>
    <button id="nextChar" class="arrow">▶</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="mBest">0</b><span>best (m)</span></div>

  </div>

</div>

<div class="overlay hidden" id="gameover">
  <div id="goTitle">TUNG DOWN!</div>
  <div style="margin:16px 0">
    <div class="goRow"><span>Distance</span><b id="goDist">0 m</b></div>
    <div class="goRow"><span>Coins</span><b id="goCoins">0</b></div>
    <div class="goRow"><span>Best</span><b id="goBest">0 m</b></div>
  </div>
  <div id="goQuip" style="font-size:14px;color:#9fe6ff;font-weight:800;min-height:20px;margin-bottom:4px"></div>
  <button class="btn" id="againBtn">RUN AGAIN ▶</button>
</div>

<div id="verTag">BRAINROT RUSH 3D v18</div>
<div id="err" style="position:fixed;left:8px;right:8px;bottom:24px;z-index:30;display:none;background:rgba(120,10,20,.92);color:#fff;font:600 12px monospace;padding:8px 12px;border-radius:8px;white-space:pre-wrap"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
const GAME_VERSION='v18';
const el=id=>document.getElementById(id);

// ============ renderer / scene / camera ============
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.15;   // richer, filmic color response
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x2a1c4a);
scene.fog=new THREE.Fog(0x2a1c4a, 45, 115);
const camera=new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 300);
const camBase=new THREE.Vector3(0,6.2,-9.5);
camera.position.copy(camBase); camera.lookAt(0,2.6,10);
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// lights
scene.add(new THREE.HemisphereLight(0xbfd4ff,0x33244a,1.05));
const sun=new THREE.DirectionalLight(0xfff3d0,1.25); sun.position.set(-8,20,6); scene.add(sun);
const rim=new THREE.DirectionalLight(0x88bbff,0.7); rim.position.set(7,9,-14); scene.add(rim);   // cool back rim to pop silhouettes

// ============ constants ============
const LANEX=2.4, SPEED0=22, SPEEDMAX=64, GRAV=85, JUMPV=27;
const P_H=2.4, P_HALF=0.55;               // player collision height & half-width/depth
const Z_SPAWN=115;
const laneOf=i=>(i-1)*LANEX;

// ============ ground + scrolling world ============
const groundMat=new THREE.MeshLambertMaterial({color:0x3a3352});
const ground=new THREE.Mesh(new THREE.BoxGeometry(LANEX*3+3, 1, 400), groundMat);
ground.position.set(0,-0.5,120); scene.add(ground);
// gravel sides
const sideMat=new THREE.MeshLambertMaterial({color:0x241d38});
for(const sx of [-1,1]){ const s=new THREE.Mesh(new THREE.BoxGeometry(10,1.2,400),sideMat); s.position.set(sx*(LANEX*1.5+6.5),-0.6,120); scene.add(s); }
// rails (visual)
const railMat=new THREE.MeshLambertMaterial({color:0x8a8496});
for(let l=0;l<3;l++){ for(const off of [-0.7,0.7]){ const r=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,400),railMat); r.position.set(laneOf(l)+off,0.07,120); scene.add(r); } }
// moving dashes (speed sense) — recycled
const dashMat=new THREE.MeshBasicMaterial({color:0xffe14d});
const dashes=[];
for(let i=0;i<26;i++){ const d=new THREE.Mesh(new THREE.PlaneGeometry(0.35,3),dashMat); d.rotation.x=-Math.PI/2; d.position.set(0,0.06,i*9); scene.add(d); dashes.push(d); }
// buildings scenery (recycled)
const bMats=[0x5a3fb0,0x8a5cff,0xe0326e,0x4fd0ff,0xff7a3d].map(c=>new THREE.MeshLambertMaterial({color:c}));
const buildings=[];
for(let i=0;i<24;i++){ const bh=8+Math.random()*22, side=i%2?1:-1;
  const b=new THREE.Mesh(new THREE.BoxGeometry(4+Math.random()*3,bh,4+Math.random()*4), bMats[i%bMats.length]);
  b.position.set(side*(11+Math.random()*8), bh/2-1, i*11); scene.add(b); buildings.push(b); }

// ============ biomes (visual progression every ~600m) ============
const BIOMES=[
  {name:'Città',      bg:0x2a1c4a, fog:0x2a1c4a, ground:0x3a3352, build:[0x5a3fb0,0x8a5cff,0xe0326e,0x4fd0ff,0xff7a3d]},
  {name:'Tramonto',   bg:0x3a1f38, fog:0x5a2f3a, ground:0x4a2f42, build:[0xff7a3d,0xffb020,0xe0326e,0xff5b6b,0x8a5cff]},
  {name:'Notte Neon', bg:0x0a0e2a, fog:0x141438, ground:0x1a2340, build:[0x00e5ff,0xff2d95,0x9d4dff,0x00ff9d,0xffe14d]},
  {name:'Foresta',    bg:0x14301f, fog:0x1a3a28, ground:0x2a4030, build:[0x46c24d,0x7ed957,0xffe14d,0x3a8f4d,0x8a5cff]},
];
let biomeIdx=-1; const _bg=new THREE.Color(0x2a1c4a), _fog=new THREE.Color(0x2a1c4a); const _tmpC=new THREE.Color();
function setBiome(i,announce){ biomeIdx=i; const b=BIOMES[i]; _bg.setHex(b.bg); _fog.setHex(b.fog);
  groundMat.color.setHex(b.ground); sideMat.color.copy(_tmpC.setHex(b.ground)).multiplyScalar(0.6);
  b.build.forEach((c,k)=>{ if(bMats[k]) bMats[k].color.setHex(c); });
  if(announce) popup(P.x,3.6,0,'🌆 '+b.name,'#ffffff'); }
setBiome(0,false);

// ============ 3D MODEL PIPELINE ============
// Procedural character factory: PBR materials + generated textures + detailed geometry.
// Each brainrot character is a data-driven build() so the roster is easy to extend/swap
// (and later we can drop in authored/AI .glb via GLTFLoader without touching game code).
function woodTexture(base){ const c=document.createElement('canvas'); c.width=96; c.height=256; const g=c.getContext('2d');
  g.fillStyle=base||'#c98a4e'; g.fillRect(0,0,96,256);
  for(let i=0;i<46;i++){ const dk=Math.random()<0.5; g.strokeStyle='rgba('+(dk?90:170)+','+(dk?52:110)+','+(dk?24:60)+','+(0.10+Math.random()*0.22)+')'; g.lineWidth=0.8+Math.random()*2.2;
    g.beginPath(); const x=Math.random()*96; g.moveTo(x,0); for(let y=0;y<=256;y+=14) g.lineTo(x+Math.sin(y*0.045+i)*4, y); g.stroke(); }
  for(let i=0;i<7;i++){ g.strokeStyle='rgba(70,40,18,0.5)'; g.lineWidth=2; g.beginPath(); const cx=Math.random()*96, cy=Math.random()*256; g.ellipse(cx,cy,3+Math.random()*4,7+Math.random()*8,0,0,7); g.stroke(); } // knots
  const t=new THREE.CanvasTexture(c); t.anisotropy=4; return t; }

const M = {
  wood:  new THREE.MeshStandardMaterial({ map:woodTexture('#c98a4e'), color:0xffffff, roughness:0.82, metalness:0.04 }),
  woodD: new THREE.MeshStandardMaterial({ map:woodTexture('#8a5730'), color:0xffffff, roughness:0.88, metalness:0.03 }),
  bat:   new THREE.MeshStandardMaterial({ map:woodTexture('#a9743e'), color:0xffffff, roughness:0.7,  metalness:0.05 }),
  white: new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.35 }),
  black: new THREE.MeshStandardMaterial({ color:0x14110d, roughness:0.5 }),
  brow:  new THREE.MeshStandardMaterial({ color:0x3a2411, roughness:0.8 }),
  mouth: new THREE.MeshStandardMaterial({ color:0x4a1010, roughness:0.6 }),
  cloth: new THREE.MeshStandardMaterial({ color:0xe8e2d0, roughness:0.9 }),
};
function part(geo,mat,x,y,z,rx,ry,rz){ const m=new THREE.Mesh(geo,mat); m.position.set(x||0,y||0,z||0); if(rx)m.rotation.x=rx; if(ry)m.rotation.y=ry; if(rz)m.rotation.z=rz; return m; }

// -- Tung Tung Tung Sahur: a wooden club/baton guy with an angry face + baseball bat --
function buildSahur(){
  const g=new THREE.Group();
  // body: smooth rounded wooden log (capsule), slightly tapered feel via a cap on top
  const body=part(new THREE.CapsuleGeometry(0.62,1.5,8,20), M.wood, 0,1.55,0); g.add(body);
  const crown=part(new THREE.SphereGeometry(0.63,20,16), M.wood, 0,2.55,0); crown.scale.set(1,0.7,1); g.add(crown);
  // head-wrap band (sahur cloth) for character
  const band=part(new THREE.CylinderGeometry(0.66,0.66,0.24,20), M.cloth, 0,2.28,0); g.add(band);
  const knot=part(new THREE.SphereGeometry(0.12,10,8), M.cloth, 0.6,2.3,0.15); g.add(knot);
  // eyes (protruding, angry) + pupils + highlights
  const eyes=[];
  for(const ex of [-0.26,0.26]){
    const e=part(new THREE.SphereGeometry(0.2,16,12), M.white, ex,2.02,0.5); g.add(e); eyes.push(e);
    const p=part(new THREE.SphereGeometry(0.1,10,8), M.black, ex*0.9,2.0,0.66); g.add(p);
    const hl=part(new THREE.SphereGeometry(0.035,6,6), M.white, ex*0.9-0.04,2.06,0.72); g.add(hl);
    // angry brow
    g.add(part(new THREE.BoxGeometry(0.34,0.09,0.1), M.brow, ex,2.28,0.5, 0,0, ex<0?0.5:-0.5));
  }
  // shouting mouth + teeth
  const mouth=part(new THREE.SphereGeometry(0.26,14,10), M.mouth, 0,1.62,0.5); mouth.scale.set(1,0.8,0.5); g.add(mouth);
  g.add(part(new THREE.BoxGeometry(0.36,0.07,0.04), M.white, 0,1.74,0.66));
  g.add(part(new THREE.BoxGeometry(0.36,0.07,0.04), M.white, 0,1.5,0.66));
  // arms (upper + hand)
  const arms=[];
  for(const s of [-1,1]){ const arm=new THREE.Group();
    arm.add(part(new THREE.CapsuleGeometry(0.14,0.7,4,10), M.woodD, 0,-0.35,0));
    arm.add(part(new THREE.SphereGeometry(0.19,12,10), M.woodD, 0,-0.78,0));   // hand
    arm.position.set(s*0.66,1.9,0); arm.rotation.z=s*0.55; g.add(arm); arms.push(arm);
  }
  // baseball bat in right hand
  const bat=new THREE.Group();
  bat.add(part(new THREE.CylinderGeometry(0.08,0.17,1.4,12), M.bat, 0,0.55,0));
  bat.add(part(new THREE.CylinderGeometry(0.09,0.09,0.28,12), M.woodD, 0,-0.12,0)); // grip
  bat.position.set(1.02,1.15,0.15); bat.rotation.set(0.2,0,0.7); g.add(bat);
  // legs (thigh capsule + foot) — grouped for run animation
  const legs=[];
  for(const s of [-1,1]){ const leg=new THREE.Group();
    leg.add(part(new THREE.CapsuleGeometry(0.17,0.55,4,10), M.woodD, 0,-0.32,0));
    leg.add(part(new THREE.BoxGeometry(0.26,0.16,0.5), M.woodD, 0,-0.62,0.12)); // foot
    leg.position.set(s*0.3,0.72,0); g.add(leg); legs.push(leg);
  }
  g.userData={legs,arms,body};
  return g;
}
// ---- load the Blender-authored GLB (procedural fallback if it fails) ----
// ---- character roster (Blender-authored GLBs, procedural fallback) ----
const CHARACTERS=[
  {id:'sahur',      name:'Tung Tung Tung Sahur',   glb:'assets/sahur.glb',      cost:0},
  {id:'tralalero',  name:'Tralalero Tralala 🦈',   glb:'assets/tralalero.glb',  cost:1500},
  {id:'bombardiro', name:'Bombardiro Crocodilo 🐊✈️', glb:'assets/bombardiro.glb', cost:3000},
];
let owned; try{ owned=JSON.parse(localStorage.getItem('br_owned')||'["sahur"]')||['sahur']; }catch(e){ owned=['sahur']; }
const isOwned=c=>c.id==='sahur'||owned.includes(c.id);
let curChar=Math.max(0, CHARACTERS.findIndex(c=>c.id===(localStorage.getItem('br_char')||'sahur')));
let player, modelLoading=false, menuReady=false;
function revealMenu(){ el('loading').style.display='none'; el('menu').classList.remove('hidden'); menuReady=true; refreshCharUI(); }
function useModel(g, legs, rotY){ if(player) scene.remove(player); player=g; g.userData={legs, baseRotY:rotY||0}; g.rotation.set(0,rotY||0,0); g.position.set(0,0,0); scene.add(g); modelLoading=false; if(!menuReady) revealMenu(); }
function loadCharacter(c){ modelLoading=true;
  new GLTFLoader().load(c.glb,
    gltf=>{ try{ const g=gltf.scene; const L=[g.getObjectByName('LegL'),g.getObjectByName('LegR')];
      if(!L[0]||!L[1]){ showErr('legs missing: '+c.id); const fb=buildSahur(); useModel(fb,fb.userData.legs,0); return; }
      useModel(g, L, Math.PI);   // Blender face +Y → glTF -Z after Y-up; flip to face +Z
    }catch(e){ showErr('model err: '+e.message); const fb=buildSahur(); useModel(fb,fb.userData.legs,0); } },
    undefined,
    err=>{ showErr('load fail '+c.id+(location.protocol==='file:'?' — file:// blocks the model; use the live URL':'')); const fb=buildSahur(); useModel(fb,fb.userData.legs,0); }
  );
}
function refreshCharUI(){ const c=CHARACTERS[curChar]; el('charName').textContent=c.name;
  if(isOwned(c)){ el('charStatus').textContent='✓ owned'; el('playBtn').textContent='RUN ▶'; }
  else if(totalCoins>=c.cost){ el('charStatus').textContent='🪙 '+c.cost+' — tap to unlock'; el('playBtn').textContent='UNLOCK 🪙'+c.cost; }
  else { el('charStatus').textContent='🔒 🪙'+c.cost+' (need '+(c.cost-totalCoins)+' more)'; el('playBtn').textContent='🔒 🪙'+c.cost; }
}
function cycleChar(d){ if(modelLoading)return; curChar=(curChar+d+CHARACTERS.length)%CHARACTERS.length; loadCharacter(CHARACTERS[curChar]); refreshCharUI(); }
function onPlay(){ const c=CHARACTERS[curChar];
  if(isOwned(c)){ localStorage.setItem('br_char',c.id); startGame(); }
  else if(totalCoins>=c.cost){ totalCoins-=c.cost; localStorage.setItem('br_coins',totalCoins); owned.push(c.id); localStorage.setItem('br_owned',JSON.stringify(owned)); localStorage.setItem('br_char',c.id); el('mCoins').textContent=totalCoins; refreshCharUI(); }
}
loadCharacter(CHARACTERS[curChar]);
// fake soft shadow
const shadow=new THREE.Mesh(new THREE.CircleGeometry(0.9,20), new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.32}));
shadow.rotation.x=-Math.PI/2; shadow.position.y=0.02; scene.add(shadow);
// hoverboard (shown while the 🛹 power-up is active)
const board=new THREE.Mesh(new THREE.BoxGeometry(0.95,0.16,2.1),
  new THREE.MeshStandardMaterial({color:0x7ef07e,emissive:0x2a8f3a,emissiveIntensity:0.55,roughness:0.3,metalness:0.4}));
board.visible=false; scene.add(board);
// ---- particle juice (pooled) ----
const pGeo=new THREE.BoxGeometry(0.2,0.2,0.2); const partPool=[], parts=[];
for(let i=0;i<90;i++){ const m=new THREE.Mesh(pGeo,new THREE.MeshBasicMaterial({color:0xffffff})); m.visible=false; scene.add(m); partPool.push(m); }

let lastOpen=1, nextZ=0;

    mesh.position.set(laneOf(lane), top/2, z+len/2); }
  else if(type==='low'){ len=1.2; top=1.05; mesh=new THREE.Mesh(new THREE.BoxGeometry(2.0,top,len), barrierMat);
    mesh.position.set(laneOf(lane), top/2, z); }

    mesh.position.set(laneOf(lane), (top+bot)/2, z); }

function spawnRow(z){
  const r=Math.random();
  if(r<0.66){
    if(Math.random()<(0.30+diffOf()*0.28)){ // two lanes blocked → open lane reachable (density ramps with distance)
      const ch=[lastOpen-1,lastOpen,lastOpen+1].filter(l=>l>=0&&l<3); const open=ch[(Math.random()*ch.length)|0];
      for(let L=0;L<3;L++) if(L!==open){ const t=pickType(); const o=addObstacle(t,L,z); if(t==='train') trainCoins(o); }
      lastOpen=open;
    } else {
      const blk=(Math.random()*3)|0; const t=pickType(); const o=addObstacle(t,blk,z); if(t==='train') trainCoins(o);
      lastOpen=(blk!==lastOpen)?lastOpen:[lastOpen-1,lastOpen+1].filter(l=>l>=0&&l<3)[0];

const MPOOL=[
  {kind:'dist', reward:250, roll:()=>{const g=[500,700,900,1200][(Math.random()*4)|0]; return {goal:g, desc:'🏃 Run '+g+'m in one run'};}},
  {kind:'coins',reward:200, roll:()=>{const g=[150,250,350,500][(Math.random()*4)|0]; return {goal:g, desc:'🪙 Collect '+g+' coins in a run'};}},
  {kind:'surf', reward:300, roll:()=>{const g=[4,6,8][(Math.random()*3)|0];       return {goal:g, desc:'🚂 Surf '+g+' train roofs'};}},
  {kind:'near', reward:300, roll:()=>{const g=[5,8,12][(Math.random()*3)|0];      return {goal:g, desc:'😎 Pull '+g+' near-misses'};}},
  {kind:'combo',reward:350, roll:()=>{const g=[3,4,5][(Math.random()*3)|0];       return {goal:g, desc:'🔥 Reach a x'+g+' combo'};}},
  {kind:'runs', reward:150, roll:()=>{const g=[3,5][(Math.random()*2)|0];         return {goal:g, desc:'🎮 Play '+g+' runs'};}},
];
function newMission(avoid){ let t; do{ t=MPOOL[(Math.random()*MPOOL.length)|0]; }while(avoid&&avoid.includes(t.kind)&&avoid.length<MPOOL.length);
  const r=t.roll(); return {kind:t.kind, reward:t.reward, goal:r.goal, desc:r.desc, prog:0, done:false}; }
function saveMissions(){ localStorage.setItem('br_missions', JSON.stringify(missions)); }
let missions; try{ missions=JSON.parse(localStorage.getItem('br_missions')); }catch(e){ missions=null; }
if(!Array.isArray(missions)||missions.length!==3){ missions=[]; while(missions.length<3) missions.push(newMission(missions.map(m=>m.kind))); saveMissions(); }
function renderMissions(){ const box=el('missions'); if(!box)return;
  box.innerHTML='<div class="msnHdr">🎯 Missions</div>'+missions.map(m=>{
    const pct=Math.min(100,(m.prog/m.goal)*100), done=m.prog>=m.goal;
    return '<div class="msn'+(done?' msnDone':'')+'"><div class="msnTop"><span>'+(done?'✅ ':'')+m.desc+'</span><b>🪙'+m.reward+'</b></div><div class="msnBar"><div class="msnFill" style="width:'+pct+'%"></div></div></div>';
  }).join(''); }
function tickMissions(rs){ let rewarded=0;
  for(const m of missions){ if(m.done)continue;
    if(m.kind==='dist'||m.kind==='combo'||m.kind==='coins')
      m.prog=Math.max(m.prog, m.kind==='dist'?rs.dist : m.kind==='combo'?rs.maxMult : rs.coins);
    else m.prog=Math.min(m.goal, m.prog + (rs[m.kind]||0));   // surf / near / runs accumulate
    if(m.prog>=m.goal){ m.done=true; rewarded+=m.reward; }
  }
  if(rewarded){ totalCoins+=rewarded; localStorage.setItem('br_coins',totalCoins); }
  missions=missions.map(m=> m.done? newMission(missions.filter(x=>x!==m).map(x=>x.kind)) : m);
  saveMissions(); return rewarded;
}

function reset(){ clearWorld(); speed=SPEED0; dist=0; coins$=0; tRun=0; shake=0; lastMile=0; lastOpen=1; nextZ=40;
  pMag=0; pX2=0; pShield=false; pInv=0; pHover=0; coyoteT=0; jumpBufT=0; combo=0; comboT=0; roofT=0;
  runSurf=0; runNear=0; runMaxMult=1; biomeIdx=-1; el('pups').textContent='';

  camera.position.set(0, camBase.y, camBase.z);

const QUIPS=['Tralalero Tralala 🦈','Bombardiro Crocodilo 🐊✈️','Sahur got tung\'d','Lirilì Larilà 🌵','skibidi sahur','Boneca Ambalabu 🐸','Cappuccino Assassino ☕','brainrot certified 🧠'];

  if(dist>best){best=Math.floor(dist);localStorage.setItem('br_best',best);}

// ============ update ============
function update(dt){
  tRun+=dt; speed=Math.min(SPEEDMAX, SPEED0+dist*0.02); dist+=speed*dt;
  while(dist>=lastMile+500){ lastMile+=500; coins$+=50; popup(P.x,3.9,0,lastMile+'m! 🎉','#ffe14d'); burst(P.x,2.2,0,12,0xffe14d,7,0.9); sPow(); }  // distance milestone reward
  // lane lerp
  const tx2=laneOf(P.lane); P.x+=(tx2-P.x)*Math.min(1,dt*13);
  // roll timer
  if(P.roll>0)P.roll-=dt;
  // vertical physics
  P.vy-=GRAV*dt; P.y+=P.vy*dt;
  // support height: ground or top of an obstacle we're standing over (same lane region, within z span)
  let support=0;
  for(const o of obstacles){ if(o.type==='over')continue;
    const dxl=Math.abs(P.x-laneOf(o.lane)); if(dxl>1.2)continue;
    if(o.z<=0.5 && o.z2>=-0.5){ if(P.y >= o.top-0.5) support=Math.max(support,o.top); }
  }
  if(P.y<=support){ if(P.vy<-0.1&&!P.grounded){ sLand(); burst(P.x,P.y+0.1,0,6,0xd8d8e0,3.5,0.4); } P.y=support; P.vy=0; P.grounded=true; } else P.grounded=false;
  // coyote time + buffered jump for responsive controls
  if(P.grounded){ coyoteT=0.10; if(jumpBufT>0 && P.roll<=0) doJump(); } else if(coyoteT>0) coyoteT-=dt;
  if(jumpBufT>0) jumpBufT-=dt;
  // roof-surf reward: standing on a train/truck roof drips a bonus (rewards the jump-on-trains mechanic)
  if(P.grounded && support>0.5){ roofT+=dt; if(roofT>=0.6){ roofT-=0.6; bumpCombo(); const b=comboMult(); coins$+=b; runSurf++;
    popup(P.x,P.y+2.4,0,'SURF +'+b,'#ffd24d'); burst(P.x,P.y+0.15,0,4,0xffe14d,3,0.6); } } else roofT=0;
  if(comboMult()>runMaxMult) runMaxMult=comboMult();
  // combo streak decays if you stop chaining
  if(comboT>0){ comboT-=dt; if(comboT<=0)combo=0; }
  // move obstacles/coins toward player
  const dz=speed*dt;
  for(const o of obstacles){ const pz=o.z; o.z-=dz; o.z2-=dz; o.mesh.position.z-=dz;
    // near-miss: a train/truck front sweeps past you in an ADJACENT lane while you're on the ground → thrill bonus
    if(!o.nm && pz>0 && o.z<=0 && (o.type==='train'||o.type==='truck')){ o.nm=true;
      const dxl=Math.abs(P.x-laneOf(o.lane));
      if(dxl>0.95 && dxl<LANEX+1.0 && P.y<o.top-0.4){
        bumpCombo(); const b=2*comboMult(); coins$+=b; runNear++;
        popup(P.x,2.3,0,'NEAR MISS +'+b,'#4fd0ff'); burst(P.x+(laneOf(o.lane)>P.x?0.7:-0.7),1.5,0,7,0x4fd0ff,5,0.7); sLane();
      } } }
  for(const c of coins){ c.z-=dz; c.mesh.position.z-=dz; c.mesh.rotation.z+=dt*6; }
  for(const pu of powerups){ pu.z-=dz; pu.grp.position.z-=dz; pu.orb.rotation.y+=dt*3; pu.grp.position.y=1.7+Math.sin(tRun*4+pu.z)*0.18; }
  // power-up timers
  if(pMag>0)pMag-=dt; if(pX2>0)pX2-=dt; if(pInv>0)pInv-=dt; if(pHover>0)pHover-=dt;
  // collisions (player plane at z≈0) — shield saves you & clears the obstacle
  if(pInv<=0) for(const o of obstacles){
    if(o.z>P_HALF || o.z2< -P_HALF) continue;               // not at player plane
    const dxl=Math.abs(P.x-laneOf(o.lane)); if(dxl>0.95) continue;  // different lane
    let crash=false;
    if(o.type==='over'){ const headTop=P.y + (P.roll>0?1.1:P_H); if(P.y<o.top && headTop>o.bot) crash=true; }
    else if(P.y < o.top-0.5) crash=true;                    // solid: ran into side/front
    if(crash){ if(pHover>0){ o.z2=-999; scene.remove(o.mesh); o.mesh.geometry.dispose(); burst(P.x,1.4,0,8,0x7ef07e,6,0.7); shake=0.3; }
               else if(pShield){ pShield=false; pInv=1.1; shake=0.8; sShield(); o.z2=-999; scene.remove(o.mesh); o.mesh.geometry.dispose(); }
               else return gameOver(); }
  }
  // magnet: vacuum nearby coins toward the player
  if(pMag>0){ for(const c of coins){ if(c.got||c.z>15||c.z<-3) continue;
    c.mesh.position.x += (P.x - c.mesh.position.x)*Math.min(1,dt*7);
    if(Math.abs(c.z)<2.4 && Math.abs(c.mesh.position.x-P.x)<1.4){ collectCoin(c); } } }
  // coin collect (normal)
  for(const c of coins){ if(c.got)continue;
    if(Math.abs(c.z)<1.1 && Math.abs(P.x-laneOf(c.lane))<1.1 && Math.abs((P.y+1.1)-c.y)<1.6){ collectCoin(c); }
  }
  // power-up collect
  for(const pu of powerups){ if(pu.got)continue;
    if(Math.abs(pu.z)<1.4 && Math.abs(P.x-laneOf(pu.lane))<1.4 && Math.abs((P.y+1.1)-pu.grp.position.y)<2.2){
      pu.got=true; scene.remove(pu.grp); activatePU(pu.type);
    }
  }
  // cull passed
  obstacles=obstacles.filter(o=>{ if(o.z2< -14){scene.remove(o.mesh); o.mesh.geometry.dispose(); return false;} return true; });
  coins=coins.filter(c=>{ if(c.got)return false; if(c.z< -8){scene.remove(c.mesh);return false;} return true; });
  powerups=powerups.filter(pu=>{ if(pu.got)return false; if(pu.z< -6){scene.remove(pu.grp);return false;} return true; });
  // spawn ahead
  nextZ-=dz; if(nextZ<=0){ spawnRow(Z_SPAWN); nextZ=Math.max(11, 22-dist*0.004); }
  // biome progression (color shift every ~600m)
  const bi=Math.floor(dist/600)%BIOMES.length; if(bi!==biomeIdx) setBiome(bi, biomeIdx>=0);
  scene.background.lerp(_bg, Math.min(1,dt*2)); scene.fog.color.lerp(_fog, Math.min(1,dt*2));
  // recycle scenery
  for(const d of dashes){ d.position.z-=dz; if(d.position.z< -12) d.position.z+=234; }
  for(const b of buildings){ b.position.z-=dz; if(b.position.z< -14) b.position.z+=264; }
  // player transform
  player.position.set(P.x, P.y, 0);
  const runcyc=Math.sin(tRun*speed*0.55);
  const L=player.userData.legs; if(P.grounded&&P.roll<=0){ L[0].rotation.x=runcyc*0.9; L[1].rotation.x=-runcyc*0.9; } else { L[0].rotation.x=L[1].rotation.x=(P.roll>0?1.2:-0.5); }
  player.scale.y = P.roll>0?0.55:1; player.position.y = P.y + (P.roll>0?0:0);
  player.rotation.z=(tx2-P.x)*0.12;
  shadow.position.set(P.x, support+0.02, 0); shadow.scale.setScalar(Math.max(0.4,1-(P.y-support)*0.05));
  board.visible=pHover>0; if(pHover>0){ board.position.set(P.x, P.y+0.1+Math.sin(tRun*12)*0.05, 0); board.rotation.z=(laneOf(P.lane)-P.x)*0.15; }
  // camera
  camera.position.x += (P.x*0.5 - camera.position.x)*Math.min(1,dt*6);
  camera.position.y = camBase.y + (shake>0? (Math.random()-0.5)*shake:0);
  camera.lookAt(P.x*0.4, 2.6, 12);
  if(shake>0)shake=Math.max(0,shake-dt*3);
  // hud
  el('scoreBox').innerHTML=Math.floor(dist)+' <small>M</small>'; el('coinBox').textContent='🪙 '+coins$;
  const cm=comboMult();
  el('pups').textContent=(cm>1?'🔥x'+cm+' ':'')+(pHover>0?'🛹 '+Math.ceil(pHover)+' ':'')+(pShield?'🛡️ ':'')+(pMag>0?'🧲 '+Math.ceil(pMag)+' ':'')+(pX2>0?'✖️2 '+Math.ceil(pX2):'');
}

// ============ loop ============
let last=performance.now();
function showErr(err){ const d=el('err'); const msg=(err&&err.message)||err&&err.toString()||'unknown'; if(d){ d.textContent='⚠️ '+msg; d.style.display='block'; } console.error(err); }
addEventListener('error', e=>showErr(e.error||e.message));
addEventListener('unhandledrejection', e=>showErr(e.reason));
function animate(now){ let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  try{
    if(state===MENU && player){ camera.position.set(0,3.4,-6.8); camera.lookAt(0,1.7,0); player.position.set(0,0,0); player.rotation.y+=dt*0.6; }
    if(state===PLAY&&!paused) update(dt);
    if(!paused){ updateParts(dt); updatePops(dt); }
    renderer.render(scene,camera);
  } catch(err){ showErr(err); }                 // never let one bad frame freeze the whole game
  requestAnimationFrame(animate); }

el('mBest').textContent=best; el('mCoins').textContent=totalCoins; el('verTag').textContent='BRAINROT RUSH 3D '+GAME_VERSION; renderMissions();
// (menu is revealed by revealMenu() once the model loads or falls back)
requestAnimationFrame(animate);

if('serviceWorker' in navigator && (location.hostname.endsWith('github.io')||location.hostname==='localhost')){
  addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
